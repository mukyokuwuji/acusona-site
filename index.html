<link rel="preconnect" href="https://fonts.bunny.net">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{

  display:flex;align-items:center;justify-content:center;

}

.card{

  border-radius:12px;
  box-shadow:0 12px 40px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06);
  padding:4em 5em;
  text-align:center;
  position:relative;z-index:1;
  animation:rise 0.8s ease-out;
}
@keyframes rise{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.logo{max-width:400px;margin:0 auto 2em}
.tagline{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:1.15em;color:#3D7A8A;font-weight:400;line-height:1.65;
  max-width:460px;margin:0 auto;
}
@media(max-width:600px){
  .card{padding:3em 2em;margin:1em}
  .logo{max-width:280px}
  .tagline{font-size:1.05em}
}
</style>
</head>
<body>
<div class="card">
